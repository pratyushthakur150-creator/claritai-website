<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#FF6B35"/>
    </linearGradient>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
  </defs>
  
  <!-- Icon - Abstract C with chat bubble -->
  <g transform="translate(0, 5)">
    <path d="M20 5 
             C 10 5, 5 12, 5 20 
             C 5 32, 12 38, 20 38 
             C 28 38, 32 33, 32 28 
             L 28 28 
             C 28 31, 25 34, 20 34 
             C 15 34, 10 30, 10 20 
             C 10 14, 14 9, 20 9 
             C 25 9, 28 12, 28 16 
             L 32 16 
             C 32 10, 28 5, 20 5 Z" 
          fill="url(#logoGradient)"/>
    
    <!-- AI dots -->
    <circle cx="38" cy="12" r="3" fill="#2563EB"/>
    <circle cx="38" cy="20" r="3" fill="#FF6B35"/>
    <circle cx="38" cy="28" r="3" fill="#10B981"/>
  </g>
  
  <!-- Text Clarit -->
  <text x="50" y="35" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="700" fill="#111827">Clarit</text>
  
  <!-- Text AI -->
  <text x="115" y="35" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-size="26" font-weight="700" fill="url(#aiGradient)">AI</text>
</svg>
